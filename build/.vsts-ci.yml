  - job: ubuntu2404arm
    # ARM64 replacement for the retired ubuntu2204arm self-hosted ARM agent.
    # Microsoft-hosted Azure Pipelines does not offer a generally-available
    # ARM64 Linux vmImage on the default Azure Pipelines agent pool, so the
    # ARM64 build and unit tests are executed inside a QEMU-emulated
    # linux/arm64 Ubuntu 24.04 container running on an x64 hosted agent.
    # This actually exercises ARM64 code generation instead of silently
    # dropping ARM coverage.
    timeoutInMinutes: 180
    pool:
      vmImage: 'ubuntu-24.04'
    displayName: 'Ubuntu 24.04 ARM64 (Custom CMake Options)'
    steps:
    - checkout: self
      submodules: true
    - download: current
      artifact: test_config_scripts
      displayName: Download artifact (test config scripts)
    - script: |
        set -e
        sudo apt-get update
        sudo apt-get install -y qemu-user-static binfmt-support
        docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
        docker pull --platform linux/arm64 ubuntu:24.04
        docker run --rm --platform linux/arm64 ubuntu:24.04 uname -m
      displayName: 'Host setup (QEMU arm64)'
    - script: |
        set -e
        docker run --rm --platform linux/arm64 \
          -v "$(Build.SourcesDirectory)":/src \
          -v "$(Pipeline.Workspace)/test_config_scripts":/test_config_scripts \
          -w /src \
          ubuntu:24.04 \
          bash -c '
            set -e
            uname -m
            apt-get update
            apt-get install -y git cmake build-essential curl libcurl4-openssl-dev libssl-dev uuid-dev ca-certificates
            mkdir -p cmake
            cd cmake
            cmake "-DcompileOption_C:STRING= " -DCMAKE_BUILD_TYPE=Debug -Drun_e2e_tests:BOOL=OFF -Drun_sfc_tests:BOOL=OFF -Drun_longhaul_tests=OFF -Duse_amqp:BOOL=ON -Duse_http:BOOL=ON -Duse_mqtt:BOOL=ON -Ddont_use_uploadtoblob:BOOL=OFF -Drun_unittests:BOOL=ON -Dno_logging:BOOL=OFF -Duse_prov_client:BOOL=ON -Duse_tpm_simulator:BOOL=OFF -Duse_edge_modules=ON -Dhsm_type_riot=OFF -Dhsm_type_x509=ON -Dhsm_type_symm_key=ON -Dhsm_type_sastoken=ON -Denable_ipv6=OFF ..
            make -j$(nproc)
          '
      displayName: 'Build (arm64 in container)'
    - script: |
        set -e
        docker run --rm --platform linux/arm64 \
          -v "$(Build.SourcesDirectory)":/src \
          -v "$(Pipeline.Workspace)/test_config_scripts":/test_config_scripts \
          -w /src/cmake \
          ubuntu:24.04 \
          bash -c '
            set -e
            apt-get update
            apt-get install -y cmake libcurl4-openssl-dev libssl-dev uuid-dev ca-certificates
            source /test_config_scripts/set_e2e_test_env_vars.sh
            ctest -T test --no-compress-output -V
          '
      displayName: 'Run Tests (arm64 in container)'
    - task: PublishTestResults@2
      displayName: 'Publish Test Results (ARM64 Custom CMake)'
      inputs:
        testRunner: CTest
        testResultsFiles: '**/Test.xml'
        mergeTestResults: true
        testRunTitle: 'ubuntu2404arm'
      condition: succeededOrFailed()

